<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Sekolah SMK</title>
    <style>
        /* CSS Reset & Font */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 8px solid #2c3e50;
            max-width: 400px;
            width: 90%;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 1rem;
            font-size: 1.8rem;
        }

        p {
            color: #27ae60;
            font-weight: bold;
            background: #e8f8f0;
            padding: 10px;
            border-radius: 8px;
            display: inline-block;
        }

        .badge {
            display: block;
            margin-top: 20px;
            font-size: 0.8rem;
            color: #95a5a6;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Website Sekolah SMK Gunawan Wibisana</h1>
        <p>✓ Deploy Otomatis Berhasil</p>
        <span class="badge">Powered by Flask & Git Webhook</span>
    </div>

</body>
</html>
